<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>NeuroStream Dashboard</title>

    <!-- Chart.js for plotting -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 24px;
        background: #0b0f17;
        color: #e8eefc;
      }
      h1 { margin-bottom: 6px; }
      .sub { color: #a9b4d0; margin-top: 0; }

      .row { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 16px; }

      .card {
        border: 1px solid #1f2a44;
        background: #101827;
        border-radius: 10px;
        padding: 12px 14px;
        min-width: 240px;
        box-shadow: 0 8px 30px rgba(0,0,0,0.25);
      }

      button {
        padding: 8px 12px;
        margin-right: 8px;
        cursor: pointer;
        background: #1f2a44;
        color: #e8eefc;
        border: 1px solid #2b3a5f;
        border-radius: 8px;
      }
      button:hover { background: #263553; }

      canvas {
        background: #0f172a;
        border: 1px solid #1f2a44;
        border-radius: 12px;
        padding: 10px;
      }

      code {
        background: #111c33;
        color: #e8eefc;
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>

  <body>
    <h1>NeuroStream</h1>
    <p class="sub">Live simulated neural stream via REST API (<code>/latest</code>)</p>

    <div class="row">
      <div class="card">
        <div><b>Status:</b> <span id="status">—</span></div>
        <div><b>Samples:</b> <span id="samples">—</span></div>
        <div><b>Channels:</b> <span id="channels">—</span></div>
        <div><b>Last timestamp:</b> <span id="ts">—</span></div>
      </div>

      <div class="card">
        <b>Controls</b>
        <div style="margin-top:10px;">
          <button id="startBtn">Start</button>
          <button id="stopBtn">Stop</button>
        </div>
        <p style="color:#a9b4d0; margin-top:10px;">
          Uses <code>POST /control</code> to start/stop acquisition.
        </p>
      </div>

      <div class="card">
        <h3>Signal Quality</h3>
        <div id="qualitySummary">Loading...</div>
        <div id="qualityBadges" style="display:flex; gap:8px; flex-wrap:wrap; margin-top:8px;"></div>
      </div>
    </div>

    <div style="margin-top:18px;">
      <canvas id="chart" width="1000" height="420"></canvas>
    </div>

    <script src="/main.js"></script>
  </body>
</html>
